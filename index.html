<style>
:root{--bg:#F6F5F2;--c:#FFF;--c2:#EFEEE9;--bd:#DDD9D0;--t1:#1E1D1B;--t2:#7A766E;--t3:#B5B0A6;--acc:#C85A3D;--g:#3A9B5B;--r:#D44040}
@media(prefers-color-scheme:dark){:root{--bg:#151413;--c:#1F1E1C;--c2:#282624;--bd:#3A3733;--t1:#E8E5DF;--t2:#8A857D;--t3:#5A5650;--acc:#D9714F}}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{background:var(--bg);font-family:'Outfit',system-ui,-apple-system,sans-serif;color:var(--t1);padding-bottom:env(safe-area-inset-bottom)}
.mono{font-family:'JetBrains Mono',ui-monospace,monospace}
.card{background:var(--c);border-radius:16px;border:1px solid var(--bd);padding:16px;margin-bottom:12px}
.tabs{display:flex;gap:3px;background:var(--c);border-radius:12px;padding:3px;border:1px solid var(--bd);margin-bottom:16px;overflow-x:auto}
.tab{flex:1;padding:10px 0;border-radius:10px;border:none;font-family:inherit;font-size:11px;font-weight:600;cursor:pointer;white-space:nowrap;transition:all .2s}
.tab.on{background:var(--acc);color:#fff}.tab.off{background:transparent;color:var(--t2)}
.row{display:flex;align-items:center;gap:6px;padding:10px 14px;border-bottom:1px solid var(--bd);transition:background .15s}
.row:active{background:var(--c2)}
.pill{display:inline-flex;padding:3px 8px;border-radius:14px;font-size:9px;font-weight:600;border:none;cursor:pointer}
.btn{padding:9px 16px;border-radius:10px;border:none;font-family:inherit;font-size:13px;font-weight:600;cursor:pointer}
.btn-a{background:var(--acc);color:#fff}
.btn-g{background:transparent;color:var(--t2);border:1.5px solid var(--bd)}
.inp{padding:9px 12px;border:1.5px solid var(--bd);border-radius:10px;background:var(--c);color:var(--t1);font-family:inherit;font-size:14px;outline:none;width:100%;-webkit-appearance:none}
.inp:focus{border-color:var(--acc)}
select.inp{font-size:13px}
.filter-bar{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:12px}
.filter-bar select{padding:7px 10px;border:1.5px solid var(--bd);border-radius:9px;background:var(--c);color:var(--t1);font-family:inherit;font-size:12px;outline:none}
.filter-bar input{flex:1;min-width:80px;padding:7px 10px;border:1.5px solid var(--bd);border-radius:9px;background:var(--c);color:var(--t1);font-family:inherit;font-size:12px;outline:none}
.month-btns{display:flex;gap:4px;margin-bottom:14px;flex-wrap:wrap}
.month-btn{padding:7px 12px;border-radius:10px;border:1.5px solid var(--bd);background:var(--c);color:var(--t2);font-size:12px;font-weight:600;cursor:pointer;font-family:inherit;white-space:nowrap}
.month-btn.on{border-color:var(--acc);background:var(--acc);color:#fff}
.bar-track{height:6px;border-radius:3px;background:var(--c2);overflow:hidden;margin-top:3px}
.bar-fill{height:100%;border-radius:3px;transition:width .4s}
.grid3{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:14px}
.grp-hdr{width:100%;display:flex;align-items:center;gap:8px;padding:11px 14px;border:none;background:none;cursor:pointer;text-align:left;font-family:inherit}
.hidden{display:none}
@media(max-width:400px){.grid3{grid-template-columns:1fr 1fr 1fr;gap:6px}}
</style>

// ═══ COMPUTE ═══
function compute(){
  const md={};MS.forEach(m=>{md[m]={};CATS.forEach(c=>md[m][c.id]=0);});
  EXP.forEach(e=>{const m=ym(e.date);if(md[m])md[m][e.cat]=(md[m][e.cat]||0)+e.absAmount;});

  const rvm={};MS.forEach(m=>rvm[m]=0);REV.forEach(r=>{const m=ym(r.date);if(rvm[m]!==undefined)rvm[m]+=r.amount;});

  const isA=state.sm==="avg";
  const sCV={};CATS.forEach(c=>{sCV[c.id]=isA?FULL.reduce((s,m)=>s+(md[m][c.id]||0),0)/FULL.length:(md[state.sm]?.[c.id]||0);});
  const sTD=Object.values(sCV).reduce((a,b)=>a+b,0);
  const sR=isA?FULL.reduce((s,m)=>s+(rvm[m]||0),0)/FULL.length:(rvm[state.sm]||0);

  const m2=isA?"2026-03":state.sm;
  const rv=rvm[m2]||0,sp=Object.values(md[m2]||{}).reduce((a,b)=>a+b,0);
  const rem=rv-sp,dps=dp(m2),dl=dim(m2)-dps;

  let fE=EXP;
  if(state.fM!=="all")fE=fE.filter(e=>ym(e.date)===state.fM);
  if(state.fC!=="all")fE=fE.filter(e=>e.cat===state.fC);
  if(state.fT!=="all")fE=fE.filter(e=>e.type===state.fT);
  if(state.q){const s=state.q.toLowerCase();fE=fE.filter(e=>e.label.toLowerCase().includes(s)||e.cat.toLowerCase().includes(s));}

  const grp={};fE.forEach(e=>{if(!grp[e.cat])grp[e.cat]=[];grp[e.cat].push(e);});
  const grpArr=Object.entries(grp).sort((a,b)=>b[1].reduce((s,e)=>s+e.absAmount,0)-a[1].reduce((s,e)=>s+e.absAmount,0));

  let fR=REV;if(state.rfM!=="all")fR=fR.filter(r=>ym(r.date)===state.rfM);
  fR=fR.sort((a,b)=>new Date(b.date)-new Date(a.date));
  const rTot={reg:fR.filter(r=>r.type==="regular").reduce((s,r)=>s+r.amount,0),occ:fR.filter(r=>r.type!=="regular").reduce((s,r)=>s+r.amount,0)};

  // Type breakdown
  const smf=isA?null:state.sm;
  const tf=smf?EXP.filter(e=>ym(e.date)===smf):EXP.filter(e=>FULL.includes(ym(e.date)));
  const dv=smf?1:FULL.length;
  const tb={reg:Math.round(tf.filter(e=>e.type==="regular").reduce((s,e)=>s+e.absAmount,0)/dv),
            occ:Math.round(tf.filter(e=>e.type==="occasional"||!e.type).reduce((s,e)=>s+e.absAmount,0)/dv),
            mul:Math.round(tf.filter(e=>e.type==="multimonth").reduce((s,e)=>s+e.absAmount,0)/dv)};

  return{md,rvm,sCV,sTD,sR,rav:{rv,sp:Math.round(sp),rem:Math.round(rem),dl,pd:dl>0?Math.round(rem/dl):0,ml:ML[m2]},
    fE,grpArr,totF:fE.reduce((s,e)=>s+e.absAmount,0),fR,rTot,tb,isA,
    netCost:CATS.filter(c=>sCV[c.id]>5).map(c=>{const b=sCV[c.id],rt=REMB[c.id]||0,n=b*(1-rt);return{...c,brut:Math.round(b),net:Math.round(n),remb:Math.round(b*rt),hasR:rt>0};}).sort((a,b)=>b.brut-a.brut)};
}

// ═══ RENDER ═══
function h(tag,attrs,...ch){
  const el=document.createElement(tag);
  if(attrs)Object.entries(attrs).forEach(([k,v])=>{
    if(k==="style"&&typeof v==="object")Object.assign(el.style,v);
    else if(k.startsWith("on"))el.addEventListener(k.slice(2).toLowerCase(),v);
    else if(k==="className")el.className=v;
    else if(k==="innerHTML")el.innerHTML=v;
    else el.setAttribute(k,v);
  });
  ch.flat(9).forEach(c=>{if(c==null)return;if(typeof c==="string"||typeof c==="number")el.appendChild(document.createTextNode(c));else el.appendChild(c);});
  return el;
}

      mb.appendChild(h("button",{className:"month-btn "+(state.sm===o.k?"on":""),onClick:()=>{state.sm=o.k;render();}},o.l));
    });
    root.appendChild(mb);

    // Reste à vivre
    const rav=d.rav;
    const rc=h("div",{className:"card",style:{background:"linear-gradient(135deg, var(--c) 0%, var(--c2) 100%)"}});
    const rTop=h("div",{style:{display:"flex",justifyContent:"space-between",alignItems:"start",marginBottom:"12px"}});
    rTop.appendChild(h("div",null,
      h("div",{style:{fontSize:"11px",color:"var(--t2)",fontWeight:500,textTransform:"uppercase",letterSpacing:"1px"}},"Reste à vivre · "+rav.ml),
      h("div",{className:"mono",style:{fontSize:"28px",fontWeight:700,color:rav.rem>=0?"var(--g)":"var(--r)",marginTop:"4px"}},f0(rav.rem))));
    if(rav.dl>0)rTop.appendChild(h("div",{style:{textAlign:"right"}},
      h("div",{style:{fontSize:"11px",color:"var(--t2)"}},"par jour restant"),
      h("div",{className:"mono",style:{fontSize:"22px",fontWeight:700,color:rav.pd>=0?"var(--g)":"var(--r)",marginTop:"4px"}},f0(rav.pd)+"/j")));
    else rTop.appendChild(h("div",{style:{textAlign:"right",fontSize:"11px",color:"var(--t3)",marginTop:"8px"}},"Mois terminé"));
    rc.appendChild(rTop);
    rc.appendChild(h("div",{style:{display:"flex",gap:"12px",fontSize:"12px",color:"var(--t2)",flexWrap:"wrap"}},
      h("span",null,"💰 "+f0(rav.rv)),h("span",null,"💸 "+f0(rav.sp)),
      rav.dl>0?h("span",null,"📅 "+rav.dl+"j restants"):null));
    if(rav.rv>0){const pct=Math.min((rav.sp/rav.rv)*100,100);
      rc.appendChild(h("div",{style:{marginTop:"10px",height:"8px",borderRadius:"4px",background:"var(--c2)",overflow:"hidden"}},
        h("div",{style:{height:"100%",width:pct+"%",borderRadius:"4px",background:pct>90?"var(--r)":pct>70?"var(--acc)":"var(--g)"}})));}
    root.appendChild(rc);

    // KPIs
    const kg=h("div",{className:"grid3"});
    [{l:d.isA?"Rev. moy.":"Revenus",v:f0(d.sR),c:"var(--g)",i:"💰"},
     {l:d.isA?"Dép. moy.":"Dépenses",v:f0(d.sTD),c:"var(--acc)",i:"💸"},
     {l:d.isA?"Solde moy.":"Solde",v:(d.sR-d.sTD>=0?"+":"")+f0(d.sR-d.sTD),c:d.sR-d.sTD>=0?"var(--g)":"var(--r)",i:d.sR-d.sTD>=0?"✅":"⚠️"}
    ].forEach(k=>{kg.appendChild(h("div",{className:"card",style:{marginBottom:0,padding:"14px 12px"}},
      h("div",{style:{fontSize:"11px",color:"var(--t2)",marginBottom:"4px"}},k.i+" "+k.l),
      h("div",{className:"mono",style:{fontSize:"18px",fontWeight:700,color:k.c}},k.v)));});
    root.appendChild(kg);

    // Type breakdown
    const tbc=h("div",{className:"card"});
    tbc.appendChild(h("h3",{style:{fontSize:"14px",fontWeight:600,marginBottom:"12px"}},"🔄 Régulier vs Ponctuel"));
    const tbg=h("div",{style:{display:"flex",gap:"10px"}});
    [{k:"reg",l:"Régulières",v:d.tb.reg,c:TC.regular},{k:"mul",l:"Plrs mois",v:d.tb.mul,c:TC.multimonth},{k:"occ",l:"Ponctuelles",v:d.tb.occ,c:TC.occasional}].filter(t=>t.v>0).forEach(t=>{
      tbg.appendChild(h("div",{style:{flex:1,padding:"12px",borderRadius:"12px",background:t.c+"12",border:"1px solid "+t.c+"30"}},
        h("div",{style:{fontSize:"11px",color:t.c,fontWeight:600,marginBottom:"4px"}},t.l),
        h("div",{className:"mono",style:{fontSize:"16px",fontWeight:700}},f0(t.v))));
    });
    tbc.appendChild(tbg);root.appendChild(tbc);

    // Net cost
    const nc=h("div",{className:"card"});
    nc.appendChild(h("h3",{style:{fontSize:"14px",fontWeight:600,marginBottom:"12px"}},"💶 Coût net ("+sl+")"));
    d.netCost.forEach(c=>{
      const r=h("div",{style:{marginBottom:"9px"}});
      const top=h("div",{style:{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:"3px"}});
      top.appendChild(h("span",{style:{fontSize:"12px"}},c.icon+" "+c.id));
      const rt=h("div",{style:{display:"flex",gap:"8px",alignItems:"center"}});
      if(c.hasR)rt.appendChild(h("span",{style:{fontSize:"9px",color:"var(--g)",background:"#3A9B5B15",padding:"1px 6px",borderRadius:"8px"}},"−"+f0(c.remb)));
      rt.appendChild(h("span",{className:"mono",style:{fontSize:"12px",fontWeight:600,color:c.color}},c.net>0?f0(c.net):"gratuit"));
      top.appendChild(rt);r.appendChild(top);
      r.appendChild(h("div",{className:"bar-track"},h("div",{className:"bar-fill",style:{width:Math.min(c.net/(1060)*100,100)+"%",background:c.color}})));
      nc.appendChild(r);
    });
    root.appendChild(nc);

    // Rev vs Dep chart (simple bars)
    const ch=h("div",{className:"card"});
    ch.appendChild(h("h3",{style:{fontSize:"14px",fontWeight:600,marginBottom:"10px"}},"Revenus vs Dépenses"));
    const bars=h("div",{style:{display:"flex",alignItems:"end",gap:"8px",height:"140px"}});
    const mx=Math.max(...MS.map(m=>Math.max(d.rvm[m]||0,Object.values(d.md[m]||{}).reduce((a,b)=>a+b,0))));
    MS.forEach(m=>{
      const rv=d.rvm[m]||0,dp=Object.values(d.md[m]||{}).reduce((a,b)=>a+b,0);
      const hR=mx>0?(rv/mx)*100:0,hD=mx>0?(dp/mx)*100:0;
      const col=h("div",{style:{flex:1,display:"flex",flexDirection:"column",alignItems:"center",gap:"3px"}});
      const pair=h("div",{style:{display:"flex",gap:"3px",alignItems:"end",height:"105px",width:"100%"}});
      pair.appendChild(h("div",{style:{flex:1,display:"flex",flexDirection:"column",alignItems:"center"}},
        h("div",{style:{fontSize:"8px",color:"var(--g)"}},rv>0?f0(rv):""),
        h("div",{style:{width:"100%",maxWidth:"26px",height:Math.max(hR,2)+"%",background:"var(--g)",borderRadius:"4px 4px 1px 1px",opacity:m==="2025-12"?.4:.7}})));
      pair.appendChild(h("div",{style:{flex:1,display:"flex",flexDirection:"column",alignItems:"center"}},
        h("div",{style:{fontSize:"8px",color:"var(--acc)"}},f0(dp)),
        h("div",{style:{width:"100%",maxWidth:"26px",height:Math.max(hD,2)+"%",background:"var(--acc)",borderRadius:"4px 4px 1px 1px",opacity:m==="2025-12"?.5:1}})));
      col.appendChild(pair);
      col.appendChild(h("div",{style:{fontSize:"10px",color:"var(--t3)"}},ML[m]));
      bars.appendChild(col);
    });
    ch.appendChild(bars);
    ch.appendChild(h("div",{style:{display:"flex",gap:"12px",fontSize:"10px",color:"var(--t3)",marginTop:"8px"}},h("span",null,"🟢 Revenus"),h("span",null,"🟠 Dépenses")));
    root.appendChild(ch);
  }

  // ═══ TRENDS ═══
  if(state.tab==="trends"){
    // Category bars by month
    const tc=h("div",{className:"card"});
    tc.appendChild(h("h3",{style:{fontSize:"14px",fontWeight:600,marginBottom:"12px"}},"📈 Évolution par catégorie"));
    CATS.filter(c=>c.id!=="Autres").forEach(cat=>{
      const vals=MS.map(m=>d.md[m]?.[cat.id]||0);
      const avg=FULL.reduce((s,m)=>s+(d.md[m]?.[cat.id]||0),0)/FULL.length;
      if(avg<20)return;
      const mx=Math.max(...vals,1);
      const row=h("div",{style:{marginBottom:"12px"}});
      row.appendChild(h("div",{style:{display:"flex",justifyContent:"space-between",marginBottom:"4px"}},
        h("span",{style:{fontSize:"12px"}},cat.icon+" "+cat.id),
        h("span",{className:"mono",style:{fontSize:"11px",fontWeight:600,color:cat.color}},f0(avg)+"/mois")));
      const barsDiv=h("div",{style:{display:"flex",gap:"4px",height:"28px",alignItems:"end"}});
      MS.forEach(m=>{
        const v=d.md[m]?.[cat.id]||0;const pct=mx>0?(v/mx)*100:0;
        const b=h("div",{style:{flex:1,display:"flex",flexDirection:"column",alignItems:"center",gap:"2px"}});
        b.appendChild(h("div",{style:{fontSize:"8px",color:"var(--t3)"}},v>10?f0(v):""));
        b.appendChild(h("div",{style:{width:"100%",height:Math.max(pct,3)+"%",background:cat.color,borderRadius:"3px",opacity:m==="2025-12"?.4:1}}));
        barsDiv.appendChild(b);
      });
      row.appendChild(barsDiv);
      tc.appendChild(row);
    });
    root.appendChild(tc);
  }

  // ═══ EXPENSES ═══
  if(state.tab==="expenses"){
    const fb=h("div",{className:"filter-bar"});
    const selM=h("select",{onChange:e=>{state.fM=e.target.value;render();}});
    selM.appendChild(h("option",{value:"all"},"Tous mois"));
    MS.forEach(m=>{const o=h("option",{value:m},ML[m]);if(state.fM===m)o.selected=true;selM.appendChild(o);});
    fb.appendChild(selM);
    const selC=h("select",{onChange:e=>{state.fC=e.target.value;render();}});
    selC.appendChild(h("option",{value:"all"},"Toutes cat."));
    CATS.forEach(c=>{const o=h("option",{value:c.id},c.icon+" "+c.id);if(state.fC===c.id)o.selected=true;selC.appendChild(o);});
    fb.appendChild(selC);
    const selT=h("select",{onChange:e=>{state.fT=e.target.value;render();}});
    selT.appendChild(h("option",{value:"all"},"Tous types"));
    [["regular","🔄 Régulières"],["occasional","⚡ Ponctuelles"]].forEach(([v,l])=>{const o=h("option",{value:v},l);if(state.fT===v)o.selected=true;selT.appendChild(o);});
    fb.appendChild(selT);
    fb.appendChild(h("button",{className:"btn btn-a",onClick:()=>{state.addE=!state.addE;render();}},"+"));
    root.appendChild(fb);

    if(state.addE)root.appendChild(renderAddForm("expense"));

    root.appendChild(h("div",{style:{display:"flex",justifyContent:"space-between",padding:"10px 14px",background:"var(--c)",borderRadius:"12px",border:"1px solid var(--bd)",marginBottom:"12px"}},
      h("span",{style:{fontSize:"13px",color:"var(--t2)"}},d.fE.length+" ops"),
      h("span",{className:"mono",style:{fontSize:"15px",fontWeight:700,color:"var(--acc)"}},f0(d.totF))));

    d.grpArr.forEach(([cat,items])=>{
      const c=ci(cat),tot=items.reduce((s,e)=>s+e.absAmount,0);
      const isO=state.openG[cat]!==false;
      const wrap=h("div",{style:{marginBottom:"8px",background:"var(--c)",borderRadius:"14px",border:"1px solid var(--bd)",overflow:"hidden"}});
      const hdr=h("button",{className:"grp-hdr",onClick:()=>{state.openG[cat]=!isO;render();}});
      hdr.appendChild(h("span",{style:{fontSize:"18px"}},c.icon));
      hdr.appendChild(h("span",{style:{flex:1,fontSize:"13px",fontWeight:600}},cat));
      hdr.appendChild(h("span",{className:"bdg mono",style:{background:c.color+"20",color:c.color}},String(items.length)));
      hdr.appendChild(h("span",{className:"mono",style:{fontSize:"13px",fontWeight:700,color:c.color,minWidth:"70px",textAlign:"right"}},f0(tot)));
      hdr.appendChild(h("span",{style:{fontSize:"11px",color:"var(--t3)",transform:isO?"rotate(180deg)":"",transition:"transform .2s",display:"inline-block"}},"▼"));
      wrap.appendChild(hdr);
      if(isO){
        const list=h("div",{style:{borderTop:"1px solid var(--bd)"}});
        items.sort((a,b)=>new Date(b.date)-new Date(a.date)).forEach(e=>{
          const row=h("div",{className:"row"});
          row.appendChild(h("span",{className:"mono",style:{color:"var(--t3)",fontSize:"10px",minWidth:"42px",flexShrink:0}},new Date(e.date).toLocaleDateString("fr-FR",{day:"2-digit",month:"short"})));
          const info=h("div",{style:{flex:1,minWidth:0}});
          info.appendChild(h("div",{style:{whiteSpace:"nowrap",overflow:"hidden",textOverflow:"ellipsis",fontSize:"12px"}},cl(e.label)));
          const meta=h("div",{style:{display:"flex",gap:"5px",alignItems:"center",marginTop:"2px"}});
          meta.appendChild(h("button",{className:"pill",style:{background:TC[e.type||"occasional"]+"20",color:TC[e.type||"occasional"]},onClick:(ev)=>{ev.stopPropagation();const types=["regular","multimonth","occasional"];const cur=types.indexOf(e.type||"occasional");const next=types[(cur+1)%3];saveExpOv(e.id,{type:next});render();}},TYPES[e.type||"occasional"]));
          info.appendChild(meta);row.appendChild(info);
          row.appendChild(h("span",{className:"mono",style:{fontSize:"11px",fontWeight:600,minWidth:"58px",textAlign:"right",flexShrink:0}},f2(e.absAmount)));
          row.appendChild(h("button",{className:"pill",style:{background:c.color+"18",color:c.color,flexShrink:0},onClick:(ev)=>{ev.stopPropagation();state.editId=state.editId===e.id?null:e.id;render();}},state.editId===e.id?"×":"✏️"));
          if(state.editId===e.id){
            const sel=h("select",{className:"inp",style:{fontSize:"11px",padding:"4px",minWidth:"100px",marginTop:"4px"},onChange:ev=>{saveExpOv(e.id,{cat:ev.target.value});state.editId=null;render();}});
            CATS.forEach(cc=>{const o=h("option",{value:cc.id},cc.icon+" "+cc.id);if(cc.id===e.cat)o.selected=true;sel.appendChild(o);});
            row.appendChild(sel);
          }
          list.appendChild(row);
        });
        wrap.appendChild(list);
      }
      root.appendChild(wrap);
    });
  }

  // ═══ REVENUES ═══
  if(state.tab==="revenues"){
    const fb=h("div",{className:"filter-bar"});
    const selM=h("select",{onChange:e=>{state.rfM=e.target.value;render();}});
    selM.appendChild(h("option",{value:"all"},"Tous mois"));
    MS.forEach(m=>{const o=h("option",{value:m},ML[m]);if(state.rfM===m)o.selected=true;selM.appendChild(o);});
    fb.appendChild(selM);
    fb.appendChild(h("button",{className:"btn btn-a",onClick:()=>{state.addR=!state.addR;render();}},"+  Revenu"));
    root.appendChild(fb);

    if(state.addR)root.appendChild(renderAddForm("revenue"));

    const kg=h("div",{className:"grid3"});
    [{l:"Total",v:d.rTot.reg+d.rTot.occ,c:"var(--g)"},{l:"🔄 Réguliers",v:d.rTot.reg,c:TC.regular},{l:"⚡ Except.",v:d.rTot.occ,c:TC.occasional}].forEach(k=>{
      kg.appendChild(h("div",{className:"card",style:{marginBottom:0,padding:"14px 12px"}},
        h("div",{style:{fontSize:"11px",color:"var(--t2)",marginBottom:"4px"}},k.l),
        h("div",{className:"mono",style:{fontSize:"17px",fontWeight:700,color:k.c}},f0(k.v))));
    });
    root.appendChild(kg);

    const list=h("div",{className:"card",style:{padding:0,overflow:"hidden"}});
    d.fR.forEach(r=>{
      const row=h("div",{className:"row"});
      row.appendChild(h("span",{className:"mono",style:{fontSize:"10px",color:"var(--t3)",minWidth:"42px"}},new Date(r.date).toLocaleDateString("fr-FR",{day:"2-digit",month:"short"})));
      const info=h("div",{style:{flex:1,minWidth:0}});
      info.appendChild(h("div",{style:{fontSize:"12px",whiteSpace:"nowrap",overflow:"hidden",textOverflow:"ellipsis"}},cl(r.label)));
      const meta=h("div",{style:{display:"flex",gap:"6px",alignItems:"center",marginTop:"2px"}});
      meta.appendChild(h("span",{style:{fontSize:"10px",fontWeight:600,color:"var(--t2)"}},r.cat));
      meta.appendChild(h("button",{className:"pill",style:{background:TC[r.type||"occasional"]+"20",color:TC[r.type||"occasional"]},
        onClick:()=>{saveRevOv(r.id,{type:r.type==="regular"?"occasional":"regular"});render();}},
        r.type==="regular"?"🔄 Régulier":"⚡ Except."));
      info.appendChild(meta);row.appendChild(info);
      row.appendChild(h("span",{className:"mono",style:{fontSize:"12px",fontWeight:600,color:"var(--g)",minWidth:"65px",textAlign:"right"}},"+"+f0(r.amount)));
      list.appendChild(row);
    });
    if(d.fR.length===0)list.appendChild(h("div",{style:{padding:"40px",textAlign:"center",color:"var(--t3)"}},"Aucun revenu"));
    root.appendChild(list);
  }

  root.appendChild(h("p",{style:{textAlign:"center",marginTop:"20px",fontSize:"10px",color:"var(--t3)"}},"Données stockées localement"));
}

function renderAddForm(type){
  const isE=type==="expense";
  const card=h("div",{className:"card",style:{border:"2px solid var(--acc)",marginBottom:"14px"}});
  card.appendChild(h("h4",{style:{fontSize:"13px",fontWeight:600,marginBottom:"10px"}},isE?"➕ Nouvelle dépense":"➕ Nouveau revenu"));

  const dateInp=h("input",{type:"date",className:"inp",value:new Date().toISOString().slice(0,10)});
  const amtInp=h("input",{type:"number",className:"inp",placeholder:"Montant €",min:"0",step:"0.01"});
  const labInp=h("input",{type:"text",className:"inp",placeholder:"Libellé",style:{marginBottom:"8px"}});

  const catSel=h("select",{className:"inp"});
  (isE?CATS:REV_CATS.map(c=>({id:c,icon:"💰"}))).forEach(c=>{catSel.appendChild(h("option",{value:c.id},c.icon+" "+c.id));});
  const typSel=h("select",{className:"inp"});
  [["regular","🔄 Régulier"],["multimonth","📅 Plrs mois"],["occasional","⚡ Ponctuel"]].forEach(([v,l])=>typSel.appendChild(h("option",{value:v},l)));

  const g1=h("div",{style:{display:"grid",gridTemplateColumns:"1fr 1fr",gap:"8px",marginBottom:"8px"}},dateInp,amtInp);
  const g2=h("div",{style:{display:"grid",gridTemplateColumns:"1fr 1fr",gap:"8px",marginBottom:"10px"}},catSel,typSel);
  const btns=h("div",{style:{display:"flex",gap:"8px"}},
    h("button",{className:"btn btn-a",onClick:()=>{
      const a=parseFloat(amtInp.value);if(!labInp.value||isNaN(a)||a<=0)return;
      if(isE)addExp({date:dateInp.value,label:labInp.value,cat:catSel.value,type:typSel.value,subCat:"Manuel",amount:-a,absAmount:a});
      else addRev({date:dateInp.value,label:labInp.value,cat:catSel.value,type:typSel.value,subCat:"Manuel",amount:a});
      if(isE)state.addE=false;else state.addR=false;render();
    }},"Ajouter"),
    h("button",{className:"btn btn-g",onClick:()=>{if(isE)state.addE=false;else state.addR=false;render();}},"Annuler"));

  card.appendChild(g1);card.appendChild(labInp);card.appendChild(g2);card.appendChild(btns);
  return card;
}

// GO
render();
</script>
